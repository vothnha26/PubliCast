version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: publicast_mysql
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: publicast
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
